name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: language_learning
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres" --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5

    env:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/language_learning
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/1
      SECRET_KEY: ci-secret-key

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web-frontend/package-lock.json

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y build-essential

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]
          python -m spacy download fr_core_news_sm

      - name: Lint with ruff
        run: ruff check .

      - name: Run unit tests
        run: pytest --cov=app --cov-report=term-missing

      - name: Audit Atelier word banks
        run: python scripts/audit_atelier_word_banks.py --output /tmp/atelier-word-bank-audit.json

      - name: Install frontend dependencies
        working-directory: web-frontend
        run: npm ci

      - name: Check frontend
        working-directory: web-frontend
        env:
          NEXT_PUBLIC_API_BASE_URL: https://api.example.com/api/v1
        run: |
          npm run type-check
          npm run lint
          npm run test:atelier-next
          npm run test:graphic-novel-images
          npm run build
          npm run build:native

      - name: Mobile viewport smoke
        working-directory: web-frontend
        env:
          CAPTURE_FRAMES: mobile-primitives-static
          CAPTURE_SKIP_AUTH: 'true'
          CAPTURE_VIEWPORTS: 390x844:compact,440x956:wide
          CAPTURE_DIR: /tmp/mobile-visual-checks
          CHROME_PATH: google-chrome
          FRONTEND_URL: http://127.0.0.1:3000
        run: |
          npm run dev -- --hostname 127.0.0.1 --port 3000 > /tmp/atelier-next.log 2>&1 &
          SERVER_PID=$!
          trap "kill $SERVER_PID" EXIT
          for attempt in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:3000/mobile-visual-qa >/dev/null; then
              break
            fi
            sleep 1
          done
          curl -fsS http://127.0.0.1:3000/mobile-visual-qa >/dev/null
          npm run capture:mobile

      - name: Verify Alembic migrations
        run: |
          alembic upgrade head
          alembic downgrade base
          alembic upgrade head

      - name: Build Docker image
        run: docker build . -t conversational-language-learning:ci
